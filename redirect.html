<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지 이동 안내 | 부산 병원 인테리어 전문 업체</title>
  
  <!-- SEO Canonical Tag -->
  <link rel="canonical" href="https://busaninterior.kr" />
  
  <!-- Fallback Redirect (3 seconds) -->
  <meta http-equiv="refresh" content="3; url=https://busaninterior.kr" />
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
      background-color: #121316;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .card {
      background-color: #1c1d22;
      padding: 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-top: 4px solid #dd5828;
    }
    h1 {
      font-size: 1.75rem;
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: #ffffff;
      font-weight: 800;
    }
    p {
      color: #a0a0ab;
      line-height: 1.6;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .loader {
      border: 3px solid #121316;
      border-top: 3px solid #dd5828;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .btn-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #dd5828;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .btn-link:hover {
      color: #f26d3d;
    }
  </style>

  <script type="text/javascript">
    // Immediate script redirect to avoid delay and maintain search engine indexing link juice
    window.location.replace("https://busaninterior.kr");
  </script>
</head>
<body>
  <div class="card">
    <h1>새로운 사이트로 이동합니다</h1>
    <p>
      부산 병원 인테리어 전문 업체의 공식 홈페이지가<br>
      새 도메인(<strong>busaninterior.kr</strong>)으로 이전 완료되었습니다.<br>
      잠시 후 자동으로 안전하게 연결됩니다.
    </p>
    <div class="loader"></div>
    <a href="https://busaninterior.kr" class="btn-link">자동으로 이동하지 않는 경우 여기를 클릭하세요.</a>
  </div>
</body>
</html>
